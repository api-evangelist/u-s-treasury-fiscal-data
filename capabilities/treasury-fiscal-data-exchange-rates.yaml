naftiko: 1.0.0-alpha2
info:
  label: Treasury Fiscal Data API — Exchange Rates
  description: 'Treasury Fiscal Data API — Exchange Rates. 1 operations. Lead operation: Treasury Fiscal Data Get Treasury
    Reporting Rates of Exchange. Self-contained Naftiko capability covering one U S Treasury Fiscal Data business surface.'
  tags:
  - U S Treasury Fiscal Data
  - Exchange Rates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    U_S_TREASURY_FISCAL_DATA_API_KEY: U_S_TREASURY_FISCAL_DATA_API_KEY
capability:
  consumes:
  - type: http
    namespace: treasury-fiscal-data-exchange-rates
    baseUri: https://api.fiscaldata.treasury.gov/services/api/fiscal_service
    description: Treasury Fiscal Data API — Exchange Rates business capability. Self-contained, no shared references.
    resources:
    - name: v1-accounting-od-rates_of_exchange
      path: /v1/accounting/od/rates_of_exchange
      operations:
      - name: getratesofexchange
        method: GET
        description: Treasury Fiscal Data Get Treasury Reporting Rates of Exchange
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: treasury-fiscal-data-exchange-rates-rest
    port: 8080
    description: REST adapter for Treasury Fiscal Data API — Exchange Rates. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/accounting/od/rates-of-exchange
      name: v1-accounting-od-rates-of-exchange
      description: REST surface for v1-accounting-od-rates_of_exchange.
      operations:
      - method: GET
        name: getratesofexchange
        description: Treasury Fiscal Data Get Treasury Reporting Rates of Exchange
        call: treasury-fiscal-data-exchange-rates.getratesofexchange
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: treasury-fiscal-data-exchange-rates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Treasury Fiscal Data API — Exchange Rates. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: treasury-fiscal-data-get-treasury
      description: Treasury Fiscal Data Get Treasury Reporting Rates of Exchange
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: treasury-fiscal-data-exchange-rates.getratesofexchange
      outputParameters:
      - type: object
        mapping: $.
