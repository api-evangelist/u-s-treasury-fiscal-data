naftiko: 1.0.0-alpha2
info:
  label: Treasury Fiscal Data API — Treasury Statements
  description: 'Treasury Fiscal Data API — Treasury Statements. 2 operations. Lead operation: Treasury Fiscal Data Get Daily
    Treasury Statement. Self-contained Naftiko capability covering one U S Treasury Fiscal Data business surface.'
  tags:
  - U S Treasury Fiscal Data
  - Treasury Statements
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    U_S_TREASURY_FISCAL_DATA_API_KEY: U_S_TREASURY_FISCAL_DATA_API_KEY
capability:
  consumes:
  - type: http
    namespace: treasury-fiscal-data-treasury-statements
    baseUri: https://api.fiscaldata.treasury.gov/services/api/fiscal_service
    description: Treasury Fiscal Data API — Treasury Statements business capability. Self-contained, no shared references.
    resources:
    - name: v1-accounting-dts-dts_table_1
      path: /v1/accounting/dts/dts_table_1
      operations:
      - name: getdailytreasurystatement
        method: GET
        description: Treasury Fiscal Data Get Daily Treasury Statement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-accounting-mts-mts_table_4
      path: /v2/accounting/mts/mts_table_4
      operations:
      - name: getmonthlytreasurystatement
        method: GET
        description: Treasury Fiscal Data Get Monthly Treasury Statement Receipts and Outlays
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: treasury-fiscal-data-treasury-statements-rest
    port: 8080
    description: REST adapter for Treasury Fiscal Data API — Treasury Statements. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/accounting/dts/dts-table-1
      name: v1-accounting-dts-dts-table-1
      description: REST surface for v1-accounting-dts-dts_table_1.
      operations:
      - method: GET
        name: getdailytreasurystatement
        description: Treasury Fiscal Data Get Daily Treasury Statement
        call: treasury-fiscal-data-treasury-statements.getdailytreasurystatement
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/accounting/mts/mts-table-4
      name: v2-accounting-mts-mts-table-4
      description: REST surface for v2-accounting-mts-mts_table_4.
      operations:
      - method: GET
        name: getmonthlytreasurystatement
        description: Treasury Fiscal Data Get Monthly Treasury Statement Receipts and Outlays
        call: treasury-fiscal-data-treasury-statements.getmonthlytreasurystatement
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: treasury-fiscal-data-treasury-statements-mcp
    port: 9090
    transport: http
    description: MCP adapter for Treasury Fiscal Data API — Treasury Statements. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: treasury-fiscal-data-get-daily
      description: Treasury Fiscal Data Get Daily Treasury Statement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: treasury-fiscal-data-treasury-statements.getdailytreasurystatement
      outputParameters:
      - type: object
        mapping: $.
    - name: treasury-fiscal-data-get-monthly
      description: Treasury Fiscal Data Get Monthly Treasury Statement Receipts and Outlays
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: treasury-fiscal-data-treasury-statements.getmonthlytreasurystatement
      outputParameters:
      - type: object
        mapping: $.
