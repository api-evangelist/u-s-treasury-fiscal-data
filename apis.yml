    description: >-
      The U.S. Treasury Fiscal Data API provides free, open access to federal
      financial data published by the Bureau of the Fiscal Service. Covers 80+
      datasets including the Debt to the Penny dataset, Treasury Reporting Rates
      of Exchange, average interest rates on Treasury securities, Daily Treasury
      Statements, Monthly Treasury Statements, U.S. savings bond redemption
      tables, and public debt outstanding by security type. No authentication
      required. Supports filtering, sorting, field selection, and pagination.

